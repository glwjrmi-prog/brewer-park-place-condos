/* Embedded Community Map Dashboard Script */

let residents = [];

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuIFWHnNjdtffjE4eyNf1AZ-qlQOEqSmOZTdwvYWkCpeI61XcxzS1gkPFdRjO8BwFyBZVW57OWfa01/pub?output=csv";

const mapInner = document.getElementById("mapInner");
const detail = document.getElementById("detail");
const search = document.getElementById("search");
const resultList = document.getElementById("resultList");

function esc(s){
  return String(s ?? "").replace(/[&<>'"]/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "'":"&#39;",
    '"':"&quot;"
  }[c]));
}

function phoneLink(phone){
  if(!phone) return "—";
  const digits = String(phone).replace(/\D/g,"");
  if(digits.length !== 10) return `<span class="note">${esc(phone)} — check number</span>`;
  return `<a href="tel:${digits}">${esc(phone)}</a>`;
}

function parseCSV(csv){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i = 0; i < csv.length; i++){
    const char = csv[i];
    const next = csv[i + 1];

    if(char === '"' && inQuotes && next === '"'){
      cell += '"';
      i++;
    } else if(char === '"'){
      inQuotes = !inQuotes;
    } else if(char === "," && !inQuotes){
      row.push(cell.trim());
      cell = "";
    } else if((char === "\n" || char === "\r") && !inQuotes){
      if(cell || row.length){
        row.push(cell.trim());
        rows.push(row);
        row = [];
        cell = "";
      }
    } else {
      cell += char;
    }
  }

  if(cell || row.length){
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function renderDetail(r){
  document.querySelectorAll(".marker").forEach(m => m.classList.remove("active","search-match"));

  const marker = document.querySelector(`.marker[data-unit="${r.unit}"]`);
  if(marker) marker.classList.add("active");

  detail.innerHTML = `
    <h2>${esc(r.name)}</h2>
    <div class="sub">Unit ${esc(r.unit)} • Street # ${esc(r.address)}</div>

    <div class="info-row">
      <div class="label">Primary Phone</div>
      <div class="value phone">${phoneLink(r.phone1)}</div>
    </div>

    <div class="info-row">
      <div class="label">Primary Email</div>
      <div class="value phone">${r.email1 ? `<a href="mailto:${esc(r.email1)}">${esc(r.email1)}</a>` : "—"}</div>
    </div>

    <div class="info-row">
      <div class="label">Secondary Phone</div>
      <div class="value phone">${phoneLink(r.phone2)}</div>
    </div>

    <div class="info-row">
      <div class="label">Secondary Email</div>
      <div class="value phone">${r.email2 ? `<a href="mailto:${esc(r.email2)}">${esc(r.email2)}</a>` : "—"}</div>
    </div>

    <div class="info-row">
      <div class="label">Notes</div>
      <div class="value ${r.notes ? "note" : ""}">${esc(r.notes || "No issues flagged")}</div>
    </div>
  `;
}

function addMarkers(){
  mapInner.querySelectorAll(".marker").forEach(m => m.remove());

  residents.forEach(r => {
    if(!r.x || !r.y) return;

    const m = document.createElement("button");
    m.className = "marker" + (r.notes ? " problem" : "");
    m.style.left = r.x + "px";
    m.style.top = r.y + "px";
    m.dataset.unit = r.unit;
    m.title = `${r.address} Brewer Park Circle - ${r.name}`;
    m.setAttribute("aria-label", `${r.address} Brewer Park Circle, ${r.name}`);
    m.textContent = r.address;
    m.addEventListener("click", () => renderDetail(r));
    mapInner.appendChild(m);
  });
}

function selectUnit(unit){
  const r = residents.find(x => Number(x.unit) === Number(unit));
  if(r) renderDetail(r);
}

function filterResidents(q){
  q = q.trim().toLowerCase();
  if(!q) return residents;

  return residents.filter(r =>
    String(r.unit || "").includes(q) ||
    String(r.address || "").includes(q) ||
    String(r.name || "").toLowerCase().includes(q)
  );
}

function renderList(items){
  resultList.innerHTML = items.map(r => `
    <div class="list-item" onclick="selectUnit(${Number(r.unit)})">
      <strong>${esc(r.address)} Brewer Park Circle</strong>
      <span class="badge">Unit ${esc(r.unit)}</span><br>
      ${esc(r.name)}
    </div>
  `).join("");
}

search.addEventListener("input", () => {
  const items = filterResidents(search.value);
  renderList(items);
  if(items.length === 1) renderDetail(items[0]);
});

function clearSearch(){
  search.value = "";
  renderList(residents);
  document.querySelectorAll(".marker").forEach(m => m.classList.remove("active","search-match"));
  detail.innerHTML = '<h2>Select a unit</h2><div class="sub">Click a number on the map or search above.</div>';
}

async function loadResidentsFromSheet(){
  try {
    const response = await fetch(SHEET_CSV_URL);
    const csv = await response.text();
    const rows = parseCSV(csv).filter(row => row.some(cell => cell !== ""));

    const headers = rows.shift().map(h => h.trim());

    residents = rows.map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i] || "");

      return {
        unit: Number(obj.Unit || obj["Unit Number"]),
        address: obj.Address,
        name: obj.Name || obj["Resident Name"],
        phone1: obj.Phone1 || obj["Primary Phone"],
        email1: obj.Email1 || obj["Primary Email"],
        phone2: obj.Phone2 || obj["Secondary Phone"],
        email2: obj.Email2 || obj["Secondary Email"],
        notes: obj.Notes || obj["Notes or Changes"],
        x: Number(obj.X),
        y: Number(obj.Y),
        show: obj.Show || "Yes"
      };
    }).filter(r => r.unit && r.address && r.show !== "No");

    addMarkers();
    renderList(residents);

  } catch(error) {
    detail.innerHTML = `<h2>Map data could not load</h2><div class="sub">Check the Google Sheet sharing and published CSV link.</div>`;
    console.error(error);
  }
}

loadResidentsFromSheet();

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuIFWHnNjdtffjE4eyNf1AZ-qlQOEqSmOZTdwvYWkCpeI61XcxzS1gkPFdRjO8BwFyBZVW57OWfa01/pub?output=csv";
const mapInner=document.getElementById('mapInner'); const detail=document.getElementById('detail'); const search=document.getElementById('search'); const resultList=document.getElementById('resultList');
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function phoneLink(phone){ if(!phone) return '<span class="note">Missing</span>'; const digits=phone.replace(/\D/g,''); if(digits.length!==10) return `<span class="note">${esc(phone)} — check number</span>`; return `<a href="tel:${digits}">${esc(phone)}</a>`; }
function renderDetail(r){
  document.querySelectorAll('.marker').forEach(m=>m.classList.remove('active','search-match'));

  const marker=document.querySelector(`.marker[data-unit="${r.unit}"]`);
  if(marker) marker.classList.add('active');

  detail.innerHTML=`
    <h2>${esc(r.name)}</h2>

    <div class="sub">Unit ${r.unit} • Street # ${esc(r.address)}</div>

    <div class="info-row">
      <div class="label">Primary Phone</div>
      <div class="value phone">${phoneLink(r.phone1)}</div>
    </div>

    <div class="info-row">
      <div class="label">Primary Email</div>
      <div class="value phone">${r.email1 ? `<a href="mailto:${esc(r.email1)}">${esc(r.email1)}</a>` : '—'}</div>
    </div>

    <div class="info-row">
      <div class="label">Secondary Phone</div>
      <div class="value phone">${r.phone2 ? phoneLink(r.phone2) : '—'}</div>
    </div>

    <div class="info-row">
      <div class="label">Secondary Email</div>
      <div class="value phone">${r.email2 ? `<a href="mailto:${esc(r.email2)}">${esc(r.email2)}</a>` : '—'}</div>
    </div>

    <div class="info-row">
      <div class="label">Notes</div>
      <div class="value ${r.notes ? 'note' : ''}">${esc(r.notes || 'No issues flagged')}</div>
    </div>
  `;
}
    function addMarkers(){ 
  residents.forEach(r=>{ 
    const m=document.createElement('button'); 
    m.className='marker'+(r.notes?' problem':''); 
    m.style.left=r.x+'px'; 
    m.style.top=r.y+'px'; 
    m.dataset.unit=r.unit; 
    m.title=`${r.address} Brewer Park Circle - ${r.name}`; 
    m.setAttribute('aria-label',`${r.address} Brewer Park Circle, ${r.name}`); 
    m.textContent = r.address;
    m.addEventListener('click',()=>renderDetail(r)); 
    mapInner.appendChild(m); 
  }); 
}
function selectUnit(unit){ const r=residents.find(x=>x.unit===unit); if(r) renderDetail(r); }
function filterResidents(q){
  q = q.trim().toLowerCase();
  if(!q) return residents;

  return residents.filter(r =>
    String(r.unit || "").includes(q) ||
    String(r.address || "").includes(q) ||
    String(r.name || "").toLowerCase().includes(q)
  );
}

function highlightSearchResults(items) {
  document.querySelectorAll('.marker').forEach(m => m.classList.remove('search-match'));

  items.forEach(r => {
    const marker = document.querySelector(`.marker[data-unit="${r.unit}"]`);
    if (marker) marker.classList.add('search-match');
  });

  if (items.length === 1) {
    renderDetail(items[0]);
    const marker = document.querySelector(`.marker[data-unit="${items[0].unit}"]`);
    if (marker) {
      marker.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }
  }
}
function renderList(items){
  resultList.innerHTML = items.map(r => `
    <div class="list-item" onclick="selectUnit(${r.unit})">
      <strong>${esc(r.address)} Brewer Park Circle</strong>
      <span class="badge">Unit ${r.unit}</span><br>
      ${esc(r.name)}
    </div>
  `).join('');
}
search.addEventListener('input',()=>{ const items=filterResidents(search.value); renderList(items); if(items.length===1) renderDetail(items[0]); });
function clearSearch(){ search.value=''; renderList(residents); document.querySelectorAll('.marker').forEach(m=>m.classList.remove('active','search-match')); detail.innerHTML='<h2>Select a unit</h2><div class="sub">Click a number on the map or search above.</div>'; }
  async function loadResidentsFromSheet(){
  const response = await fetch(SHEET_CSV_URL);
  const csv = await response.text();

  const rows = csv.trim().split("\n").map(row =>
    row.split(",").map(cell => cell.replace(/^"|"$/g, "").trim())
  );

  const headers = rows.shift();

  residents = rows.map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i] || "");

    return {
      unit: Number(obj.Unit),
      address: obj.Address,
      name: obj.Name,
      phone1: obj.Phone1,
      email1: obj.Email1,
      phone2: obj.Phone2,
      email2: obj.Email2,
      notes: obj.Notes,
      x: Number(obj.X),
      y: Number(obj.Y),
      show: obj.Show
    };
  }).filter(r => r.show !== "No");

  addMarkers();
  renderList(residents);
}
loadResidentsFromSheet();
</script>
<script>
document.querySelectorAll(".rules-title").forEach(title => {
  title.addEventListener("click", () => {
    const content = title.nextElementSibling;

    if (content.style.display === "block") {
      content.style.display = "none";
    } else {
      content.style.display = "block";
    }
  });
});

document.getElementById("rulesSearch").addEventListener("input", function () {

  const q = this.value.toLowerCase();

  document.querySelectorAll(".rules-section").forEach(section => {

    const text = section.textContent.toLowerCase();

    section.style.display =
      text.includes(q) || q === ""
        ? "block"
        : "none";

  });

});
</script>
</body>
