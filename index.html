<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brewer Park Place Condos | Community Hub</title>
 
  <style>
    .rules-title{
  cursor:pointer;
  background:#f3f7fa;
  padding:14px;
  border-radius:10px;
  margin-top:14px;
}

.rules-content{
  display:none;

}
    :root {
      --navy: #1f3a5f;
      --blue: #2f6f9f;
      --sky: #eaf4fb;
      --green: #2f6b57;
      --cream: #f7f4ed;
      --border: #d9e2ea;
      --text: #1f2937;
      --muted: #667085;
      --card: #ffffff;
      --important: #fff6d7;
      --urgent: #ffe4e4;
      --shadow: 0 10px 28px rgba(15, 23, 42, .09);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f5f8fb 0%, #eef3f7 100%);
      font-size: 18px;
      line-height: 1.5;
    }

    header {
      color: white;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.20), transparent 34%),
        linear-gradient(135deg, var(--navy), var(--blue));
      padding: 42px 22px 34px;
      border-bottom: 6px solid rgba(255,255,255,.22);
    }

    .hero {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: center;
    }

    .brand-kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    header h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: -.03em;
    }

    header p {
      margin: 12px 0 0;
      font-size: 21px;
      opacity: .95;
      max-width: 760px;
    }

    .hero-card {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 22px;
      padding: 18px;
      min-width: 260px;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
    }

    .hero-card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 24px 36px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin: -48px 0 22px;
      align-items: center;
    }

    .search-wrap {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    input[type="search"] {
      width: 100%;
      padding: 17px 18px;
      border: 0;
      outline: 0;
      border-radius: 14px;
      font-size: 20px;
      background: #f8fafc;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 16px;
      border-radius: 999px;
      background: white;
      color: var(--navy);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      min-height: 55px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 28px;
    }

    nav a {
      color: var(--navy);
      background: white;
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(15, 23, 42, .05);
    }

    nav a:hover { border-color: var(--blue); }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    section { margin: 32px 0; }
    h2 {
      color: var(--navy);
      font-size: 31px;
      margin: 0;
      letter-spacing: -.02em;
    }

    .section-note {
      color: var(--muted);
      font-size: 16px;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .07);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 23px;
      color: #172033;
    }

    .meta {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 9px;
      font-weight: 600;
    }

    .card a {
      color: var(--blue);
      font-weight: 700;
    }

    .button-link {
      display: inline-block;
      margin-top: 4px;
      padding: 10px 13px;
      border-radius: 12px;
      background: var(--sky);
      text-decoration: none;
    }


    .announcement-list {
      margin: 0;
      padding-left: 1.4rem;
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .announcement-list li {
      margin: 0 0 .6rem;
      padding-left: .25rem;
    }
    .announcement.important { background: var(--important); border-color: #f3d36b; }
    .announcement.urgent { background: var(--urgent); border-color: #ee9a9a; }

    .notice {
      border-left: 6px solid var(--blue);
      background: white;
      padding: 17px 19px;
      border-radius: 16px;
      margin: 0 0 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .05);
    }

    .quick-card {
      border-top: 5px solid var(--blue);
    }



    .contact-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .contact-search {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 18px;
      background: white;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .05);
    }

    .contact-count {
      white-space: nowrap;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .contact-group {
      margin: 18px 0 26px;
    }

    .contact-group-title {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 24px;
      border-left: 6px solid var(--green);
      padding-left: 12px;
    }

    .contact-card {
      position: relative;
      overflow: hidden;
      border-top: 5px solid var(--blue);
    }

    .contact-card.board { border-top-color: var(--navy); }
    .contact-card.management { border-top-color: var(--green); }
    .contact-card.emergency { border-top-color: #b42318; }

    .contact-name {
      font-size: 21px;
      font-weight: 800;
      color: #172033;
      margin-bottom: 2px;
    }

    .contact-role {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .contact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
    }

    .contact-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 13px;
      border-radius: 12px;
      background: var(--sky);
      color: var(--blue);
      text-decoration: none;
      font-weight: 800;
      border: 1px solid #cfe5f3;
    }

    .contact-button.emergency {
      color: #b42318;
      background: #fff1f0;
      border-color: #ffd1cc;
    }

    .contact-note {
      margin-top: 10px;
      color: var(--text);
    }

    .private-note {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 15px;
      border: 1px dashed var(--border);
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 36px;
      padding: 26px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
      background: rgba(255,255,255,.55);
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      body { font-size: 17px; }
      .hero { grid-template-columns: 1fr; }
      .hero-card { min-width: auto; }
      main { padding: 18px 16px 30px; }
      .toolbar { grid-template-columns: 1fr; margin-top: -36px; }
      .section-title { display: block; }
      .section-note { margin-top: 4px; }
      .contact-tools { grid-template-columns: 1fr; }
    }
  
   

<script>

<script>
document.querySelectorAll(".rules-title").forEach(title => {
  title.addEventListener("click", () => {
    const content = title.nextElementSibling;

    if (content.style.display === "block") {
      content.style.display = "none";
    } else {
      content.style.display = "block";
    }
  });
});

document.getElementById("rulesSearch").addEventListener("input", function () {

  const q = this.value.toLowerCase();

  document.querySelectorAll(".rules-section").forEach(section => {

    const text = section.textContent.toLowerCase();

    section.style.display =
      text.includes(q) || q === ""
        ? "block"
        : "none";

  });

});
</script>
</body>
</html>
